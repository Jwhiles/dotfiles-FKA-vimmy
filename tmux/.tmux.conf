# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'

set -g allow-rename off
set -g mode-keys vi
set -g mouse on

bind -T copy-mode-vi y send-keys -X copy-pipe-no-clear 'pbcopy'
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'pbcopy'

bind-key c new-window -c "#{pane_current_path}"
bind-key % split-window -h -c "#{pane_current_path}"
bind-key '"' split-window -v -c "#{pane_current_path}"

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n C-h if-shell "$is_vim" "send-keys C-h"  "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j"  "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k"  "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l"  "select-pane -R"
bind-key -T copy-mode-vi C-h select-pane -L
bind-key -T copy-mode-vi C-j select-pane -D
bind-key -T copy-mode-vi C-k select-pane -U
bind-key -T copy-mode-vi C-l select-pane -R

# Session switcher — works from any app in the pane (shell, vim, claude code, ...)
# tmux grabs C-f before the running app sees it.
bind-key -n C-f display-popup -E -w 80% -h 80% "tm-sesh"


bind -r h resize-pane -L 10
bind -r j resize-pane -D 10
bind -r k resize-pane -U 10
bind -r l resize-pane -R 10


set -sg escape-time 0
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# Reload config
bind r source-file ~/.tmux.conf \; display "reloaded"

# Vim-style visual selection in copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection

# Start numbering at 1 and keep it gapless
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Kill current session and switch to another — mirrors the C-f switcher
bind X run-shell session-kill
